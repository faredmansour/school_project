version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: school_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: school_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - school_network

  # ── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/school_db
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - school_network

  # ── Frontend (Nginx) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - school_network

networks:
  school_network:
    driver: bridge

volumes:
  mongo_data:
